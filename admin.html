<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BOOK TO LEARN & RUN 관리자" />
    <title>관리자 | BOOK TO LEARN &amp; RUN</title>
    <link rel="icon" href="image/logo.png" type="image/png" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="config.js" defer></script>
    <script src="supabase-client.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body data-page="admin">
    <a class="skip-link" href="#main-content">본문 바로가기</a>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="index.html" aria-label="BOOK TO LEARN & RUN 홈"><span class="brand-mark" aria-hidden="true"><span></span></span><span class="brand-copy"><strong>BOOK TO LEARN &amp; RUN</strong><small>PUBLIC LIBRARY SERVICE</small></span></a>
        <form class="header-search" role="search"><label class="sr-only" for="header-search-admin">도서 검색</label><input id="header-search-admin" name="q" type="search" placeholder="책 제목, 저자, 키워드 검색" /><button type="submit" aria-label="검색"><span aria-hidden="true">⌕</span><span class="search-text">검색</span></button></form>
        <div class="auth-area" data-auth-area></div>
      </div>
      <nav class="main-nav" aria-label="주요 메뉴"><div class="nav-inner"><a href="index.html">홈</a><a href="search.html">도서검색</a><a href="mypage.html">마이페이지</a><a href="#users">유저 관리</a><a href="#books">도서 관리</a></div></nav>
    </header>
    <main id="main-content" class="page-main admin-main">
      <div class="shell">
        <div class="admin-heading"><p class="eyebrow">ADMINISTRATION</p><h1>도서관 관리자</h1><p>회원 권한과 도서 정보를 관리합니다.</p></div>
        <p id="admin-page-message" class="form-message" role="alert"></p>
        <div id="admin-content" hidden>
          <section id="users" class="admin-panel">
            <div class="admin-panel-heading"><div><p class="eyebrow">MEMBERS</p><h2>유저 관리</h2></div><button id="refresh-users" class="button button-secondary" type="button">새로고침</button></div>
            <div class="admin-table-wrap"><table class="admin-table"><thead><tr><th>아이디</th><th>이름</th><th>이메일</th><th>권한</th><th>가입일</th><th>최근 로그인</th><th>관리</th></tr></thead><tbody id="admin-user-list"></tbody></table></div>
          </section>
          <section id="books" class="admin-panel">
            <div class="admin-panel-heading"><div><p class="eyebrow">COLLECTION</p><h2>도서 관리</h2></div></div>
            <form id="admin-book-form" class="admin-book-form">
              <input type="hidden" name="originalId" />
              <div><label for="admin-book-id">도서 ID</label><input id="admin-book-id" name="id" type="text" placeholder="비워두면 자동 생성" /></div>
              <div><label for="admin-book-title">제목</label><input id="admin-book-title" name="title" type="text" required /></div>
              <div><label for="admin-book-author">저자</label><input id="admin-book-author" name="author" type="text" required /></div>
              <div><label for="admin-book-publisher">출판사</label><input id="admin-book-publisher" name="publisher" type="text" /></div>
              <div><label for="admin-book-date">출판일</label><input id="admin-book-date" name="publishedDate" type="date" /></div>
              <div><label for="admin-book-isbn">ISBN</label><input id="admin-book-isbn" name="isbn" type="text" /></div>
              <div><label for="admin-book-category">카테고리</label><input id="admin-book-category" name="category" type="text" required /></div>
              <div><label for="admin-book-status">대출 상태</label><select id="admin-book-status" name="loanStatus"><option>대출 가능</option><option>대출 중</option><option>예약 가능</option></select></div>
              <div><label for="admin-book-location">위치</label><input id="admin-book-location" name="location" type="text" /></div>
              <div><label for="admin-book-call">청구기호</label><input id="admin-book-call" name="callNumber" type="text" /></div>
              <div><label for="admin-book-thumbnail">표지 이미지 경로</label><input id="admin-book-thumbnail" name="thumbnail" type="text" /></div>
              <div><label for="admin-book-keywords">키워드</label><input id="admin-book-keywords" name="keywords" type="text" placeholder="쉼표로 구분" /></div>
              <div class="admin-form-wide"><label for="admin-book-short">짧은 소개</label><input id="admin-book-short" name="shortDescription" type="text" /></div>
              <div class="admin-form-wide"><label for="admin-book-description">상세 설명</label><textarea id="admin-book-description" name="description" rows="4"></textarea></div>
              <div class="admin-form-actions"><button class="button button-primary" type="submit">도서 저장</button><button id="cancel-book-edit" class="button button-secondary" type="button">입력 초기화</button></div>
              <p id="admin-book-message" class="form-message admin-form-wide" role="alert"></p>
            </form>
            <div id="admin-book-list" class="admin-book-list"></div>
          </section>
        </div>
      </div>
    </main>
    <footer class="site-footer"><div class="shell footer-inner"><div><strong>BOOK TO LEARN &amp; RUN</strong><p>도서 검색부터 예약까지, 일상 가까이의 공공 도서관.</p></div><div class="footer-note"><p>사업자 : Book To Run&amp;Learn</p><p>전화번호 : <a href="tel:010-6314-1491">010-6314-1491</a></p></div></div></footer>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </body>
</html>
